<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chat</title>

<script>
tailwind.config = {
    theme: {
        extend: {
            fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
            colors: {
                app: { bg: '#0F0F11', surface: '#121214', elevated: '#18181C', border: 'rgba(255,255,255,0.06)' },
                bubble: { me: '#22252D', other: '#1C1E24' },
                text: { primary: '#F5F5F5', secondary: '#E5E7EB', muted: '#9CA3AF', faint: '#6B7280' }
            }
        }
    }

<style>
* { -webkit-tap-highlight-color: transparent; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
body { font-family: 'Inter', system-ui, sans-serif; background-color: #0F0F11; color: #F5F5F5; overflow: hidden; touch-action: manipulation; }
::selection { background: rgba(255,255,255,0.12); color: #fff; }
.custom-scroll::-webkit-scrollbar { width: 4px; }
.custom-scroll::-webkit-scrollbar-track { background: transparent; }
.custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }
.chat-row { transition: background-color 0.15s ease; }
.chat-row:hover { background-color: rgba(255,255,255,0.03); }
.chat-row.active { background-color: rgba(255,255,255,0.05); }
.bubble-me { background-color: #22252D; color: #F5F5F5; }
.bubble-other { background-color: #1C1E24; color: #E5E7EB; }
.input-field:focus { outline: none; }
.send-btn { transition: opacity 0.15s ease, transform 0.1s ease; }
.send-btn:active { transform: scale(0.92); opacity: 0.7; }
.screen-transition { transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
.msg-enter { animation: msgIn 0.2s ease-out forwards; }
@keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.typing-dot { width: 5px; height: 5px; background: rgba(255,255,255,0.4); border-radius: 50%; display: inline-block; animation: typing 1.4s infinite ease-in-out both; }
.typing-dot:nth-child(1) { animation-delay: 0s; }
.typing-dot:nth-child(2) { animation-delay: 0.16s; }
.typing-dot:nth-child(3) { animation-delay: 0.32s; }
@keyframes typing { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }
.status-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
.status-online { background-color: #4ADE80; }
.status-offline { background-color: #525252; }
.icon-btn { transition: color 0.15s ease; }
.icon-btn:hover { color: #F5F5F5; }
.search-input::placeholder, .msg-input::placeholder { color: #6B7280; }
.cropper-modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); align-items: center; justify-content: center; padding: 20px; }
.cropper-modal.active { display: flex; }
.cropper-container { max-width: 500px; width: 100%; background: #18181C; border-radius: 16px; border: 1px solid rgba(255,255,255,0.06); overflow: hidden; }
.cropper-img-box { max-height: 400px; overflow: hidden; background: #0F0F11; }
.cropper-img-box img { max-width: 100%; display: block; }
.auth-overlay { position: fixed; inset: 0; z-index: 90; background: rgba(15,15,17,0.95); backdrop-filter: blur(12px); display: flex; align-items: center; justify-content: center; }
.auth-box { width: 100%; max-width: 380px; background: #18181C; border: 1px solid rgba(255,255,255,0.06); border-radius: 20px; padding: 32px; }
.auth-input { width: 100%; background: #0F0F11; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 12px 16px; color: #F5F5F5; font-size: 14px; transition: border-color 0.2s; }
.auth-input:focus { outline: none; border-color: rgba(255,255,255,0.2); }
.auth-input::placeholder { color: #6B7280; }
.auth-btn { width: 100%; background: #F5F5F5; color: #0F0F11; border: none; border-radius: 12px; padding: 12px; font-weight: 600; font-size: 14px; cursor: pointer; transition: opacity 0.2s; }
.auth-btn:hover { opacity: 0.9; }
.auth-btn:active { transform: scale(0.98); }
.auth-tab { padding: 8px 16px; font-size: 13px; color: #6B7280; cursor: pointer; border-radius: 8px; transition: all 0.2s; }
.auth-tab.active { color: #F5F5F5; background: rgba(255,255,255,0.05); }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: #18181C; border: 1px solid rgba(255,255,255,0.08); color: #F5F5F5; padding: 10px 20px; border-radius: 12px; font-size: 13px; z-index: 200; opacity: 0; transition: all 0.3s ease; pointer-events: none; }
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
.spinner { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.1); border-top-color: #F5F5F5; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.msg-image { border-radius: 8px; max-width: 240px; max-height: 320px; object-fit: cover; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); }
.msg-status { display: inline-flex; align-items: center; gap: 2px; }
.msg-status i { font-size: 10px; }
.typing-indicator-container { display: none; padding: 4px 16px; margin-bottom: 4px; }
.typing-indicator-container.visible { display: block; }
.typing-text { font-size: 11px; color: #9CA3AF; margin-bottom: 4px; margin-right: 8px; }
.admin-badge { background: linear-gradient(135deg, #4ADE80 0%, #22c55e 100%); color: #0F0F11; font-size: 9px; font-weight: 700; padding: 1px 6px; border-radius: 4px; margin-right: 6px; }
.retry-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #F5F5F5; padding: 8px 16px; border-radius: 8px; font-size: 12px; cursor: pointer; transition: all 0.2s; }
.retry-btn:hover { background: rgba(255,255,255,0.1); }
.load-more-btn { background: transparent; border: 1px solid rgba(255,255,255,0.08); color: #9CA3AF; padding: 6px 16px; border-radius: 20px; font-size: 11px; cursor: pointer; margin: 8px auto; display: block; transition: all 0.2s; }
.load-more-btn:hover { background: rgba(255,255,255,0.03); color: #F5F5F5; }
.avatar-placeholder { display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 14px; color: #F5F5F5; background: linear-gradient(135deg, #374151 0%, #1f2937 100%); }
.modal-overlay { display: none; position: fixed; inset: 0; z-index: 95; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.active { display: flex; }
.modal-box { width: 100%; max-width: 400px; background: #18181C; border: 1px solid rgba(255,255,255,0.06); border-radius: 20px; padding: 24px; max-height: 85vh; overflow-y: auto; }
.user-row { padding: 10px 12px; border-radius: 12px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 10px; }
.user-row:hover { background: rgba(255,255,255,0.03); }
.profile-avatar-btn { position: relative; cursor: pointer; }
.profile-avatar-btn:hover::after { content: '\f030'; font-family: 'Font Awesome 6 Free'; font-weight: 900; position: absolute; inset: 0; background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #fff; }
</style>
</head>

            if (event === 'SIGNED_IN' && session) {
                currentUser = session.user;
                isAdmin = (currentUser.id === ADMIN_UID);

                hideAuthOverlay();
                setupAdminUI();

// ==================== AVATAR HELPERS ====================
function getAvatarUrl(profile, size = 40) {
    if (profile && profile.avatar_url) return profile.avatar_url;
    return null;
}

function getInitials(name) {
    if (!name) return 'U';
    const parts = name.trim().split(/\s+/);
    if (parts.length === 1) return parts[0].charAt(0).toUpperCase();
    return (parts[0].charAt(0) + parts[parts.length - 1].charAt(0)).toUpperCase();
}

function renderAvatar(imgEl, placeholderEl, profile, size = 40) {
    const url = getAvatarUrl(profile);
    if (url) {
        imgEl.src = url;
        imgEl.style.display = 'block';
        if (placeholderEl) placeholderEl.style.display = 'none';
    } else {
        imgEl.style.display = 'none';
        if (placeholderEl) {
            placeholderEl.style.display = 'flex';
            placeholderEl.textContent = getInitials(profile?.username || profile?.email);
        }
    }
}

async function loadUserProfile() {

    try {
        const { data, error } = await supabase.from('profiles').select('*').eq('id', currentUser.id).single();
        if (error) {
            if (error.code === 'PGRST116') {
                await createUserProfile();
                return;
            }
            throw error;
        }
        if (data) {
            currentProfile = data;
            renderAvatar(document.getElementById('myAvatar'), document.getElementById('myAvatarPlaceholder'), { ...data, email: currentUser.email });
            updateMyStatusUI(data.status, data.last_seen);
        }
    } catch (err) {
        console.error('loadUserProfile error:', err);
    }
}

async function createUserProfile() {

        await supabase.from('profiles').insert({
            id: currentUser.id,

async function startChatWithUser(userId, username, avatarUrl) {
    try {
        closeNewChatModal();
        showToast('جاري إنشاء المحادثة...');
        // Check if chat already exists
        const { data: existing, error: existingError } = await supabase
            .from('participants')
            .select('chat_id')
            .eq('user_id', currentUser.id);
        if (existingError) throw existingError;

        if (existing && existing.length > 0) {
            const chatIds = existing.map(e => e.chat_id);
            const { data: common, error: commonError } = await supabase
                .from('participants')
                .select('chat_id')
                .eq('user_id', userId)
                .in('chat_id', chatIds);
            if (commonError) throw commonError;
            if (common && common.length > 0) {
                const chatId = common[0].chat_id;
                openChat(chatId, username, avatarUrl, 'Online', false, userId);
                return;
            }
        }

        // Create new chat
        const { data: chatData, error: chatError } = await supabase.from('chats').insert({
            type: 'private',
            created_at: new Date().toISOString(),
            updated_at: new Date().toISOString()
        }).select().single();
        if (chatError) throw chatError;

        await supabase.from('participants').insert([
            { chat_id: chatData.id, user_id: currentUser.id },
            { chat_id: chatData.id, user_id: userId }
        ]);

        await fetchChats();
        openChat(chatData.id, username, avatarUrl, 'Online', false, userId);
        showToast('تم إنشاء المحادثة');
    } catch (err) {
        console.error('startChatWithUser error:', err);
        showToast('فشل إنشاء المحادثة');
    }
}

    document.getElementById('tabLogin').classList.toggle('active', mode === 'login');

async function handleAuth(e) {
    e.preventDefault();
    const email = document.getElementById('authEmail').value;
    const password = document.getElementById('authPassword').value;
    const name = document.getElementById('authName').value;
    const btn = document.getElementById('authBtn');
    btn.innerHTML = '<div class="spinner mx-auto"></div>';
    btn.disabled = true;
    try {
        if (authMode === 'register') {
            const { data, error } = await supabase.auth.signUp({ email, password });
            if (error) throw error;
            if (data.user) {
                await supabase.from('profiles').insert({
                    id: data.user.id,
                    username: name || email.split('@')[0],
                    avatar_url: null,
                    status: 'Online',
                    last_seen: new Date().toISOString(),
                    is_online: true
                });
            }
            showToast('تم إنشاء الحساب! تحقق من بريدك');
        } else {
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) throw error;
        }
    } catch (err) {
        showToast(err.message || 'خطأ في المصادقة');
        console.error('Auth error:', err);
    } finally {
        btn.textContent = authMode === 'login' ? 'تسجيل الدخول' : 'إنشاء حساب';
        btn.disabled = false;
    }
}

// ==================== CHAT LIST ====================
async function fetchChats() {
    if (!currentUser) return;
    const chatList = document.getElementById('chatList');
    try {
        // Get chat IDs where current user is participant
        const { data: participants, error: participantsError } = await supabase
            .from('participants')
            .select('chat_id')
            .eq('user_id', currentUser.id);
        if (participantsError) throw participantsError;
        if (!participants || participants.length === 0) { renderEmptyChatList(); return; }

        const chatIds = participants.map(p => p.chat_id);

        // Get chats with updated_at
        const { data: chats, error: chatsError } = await supabase
            .from('chats')
            .select('id, name, type, avatar_url, created_at, updated_at')
            .in('id', chatIds);
        if (chatsError) throw chatsError;

        // Get other participants
        const { data: allParticipants, error: allPartError } = await supabase
            .from('participants')
            .select('chat_id, user_id, profiles:user_id (id, username, avatar_url, status, last_seen, is_online)')
            .in('chat_id', chatIds)
            .neq('user_id', currentUser.id);
        if (allPartError) throw allPartError;

        // Get last messages
        const { data: lastMessages, error: msgError } = await supabase
            .from('messages')
            .select('id, chat_id, content, media_url, sender_id, created_at, is_read, status, sender:sender_id (username)')
            .in('chat_id', chatIds)
            .order('created_at', { ascending: false });
        if (msgError) throw msgError;

        // Get unread counts
        const { data: unreadData, error: unreadError } = await supabase
            .from('messages')
            .select('chat_id, id')
            .in('chat_id', chatIds)
            .neq('sender_id', currentUser.id)
            .eq('is_read', false);
        if (unreadError) throw unreadError;

        const unreadCounts = {};
        if (unreadData) {
            unreadData.forEach(m => { unreadCounts[m.chat_id] = (unreadCounts[m.chat_id] || 0) + 1; });
        }

        const lastMessageMap = {};
        if (lastMessages) {
            lastMessages.forEach(m => { if (!lastMessageMap[m.chat_id]) lastMessageMap[m.chat_id] = m; });
        }

        const otherParticipantsMap = {};
        if (allParticipants) {
            allParticipants.forEach(p => {
                if (!otherParticipantsMap[p.chat_id]) otherParticipantsMap[p.chat_id] = [];
                otherParticipantsMap[p.chat_id].push(p);
            });
        }

        chatsData = chats.map(chat => {
            const otherParts = otherParticipantsMap[chat.id] || [];
            const otherProfile = otherParts[0]?.profiles || null;
            const lastMsg = lastMessageMap[chat.id] || null;
            const unread = unreadCounts[chat.id] || 0;
            return { ...chat, otherProfile, lastMessage: lastMsg, unreadCount: unread, otherParticipants: otherParts };
        }).sort((a, b) => {
            const timeA = a.lastMessage?.created_at || a.updated_at || a.created_at;
            const timeB = b.lastMessage?.created_at || b.updated_at || b.created_at;
            return new Date(timeB) - new Date(timeA);
        });

        renderChatList(chatsData);
    } catch (err) {
        console.error('fetchChats error:', err);
        chatList.innerHTML = '<div class="flex flex-col items-center justify-center h-full text-[#525252] px-6"><i class="fas fa-triangle-exclamation text-2xl mb-3 text-[#525252]"></i><p class="text-[12px] text-[#6B7280] text-center mb-3">فشل تحميل المحادثات</p><p class="text-[11px] text-[#525252] text-center mb-4">' + escapeHtml(err.message || 'خطأ غير معروف') + '</p><button onclick="fetchChats()" class="retry-btn"><i class="fas fa-rotate-right ml-1"></i> إعادة المحاولة</button></div>';
    }
}

function renderEmptyChatList() {
    document.getElementById('chatList').innerHTML = '<div class="flex flex-col items-center justify-center h-full text-[#525252] px-6"><div class="w-12 h-12 rounded-full bg-[#18181C] flex items-center justify-center mb-3 border border-white/[0.04]"><i class="fas fa-comment-slash text-lg text-[#6B7280]"></i></div><p class="text-[12px] text-[#6B7280] text-center">لا توجد محادثات بعد.<br>ابدأ محادثة جديدة!</p><button onclick="openNewChatModal()" class="mt-3 text-[11px] text-[#9CA3AF] hover:text-[#F5F5F5] underline">محادثة جديدة</button></div>';
}

function renderChatList(chats) {
    const list = document.getElementById('chatList');
    if (!chats || !chats.length) { renderEmptyChatList(); return; }
    list.innerHTML = chats.map(chat => {
        const otherProfile = chat.otherProfile;
        const lastMsg = chat.lastMessage;
        const unreadCount = chat.unreadCount;
        const isOnline = otherProfile?.is_online;
        const chatName = chat.type === 'group' ? chat.name : (otherProfile?.username || 'مستخدم');
        const initials = getInitials(chatName);
        const avatarHtml = (chat.type !== 'group' && otherProfile?.avatar_url)
            ? '<img src="' + otherProfile.avatar_url + '" class="w-10 h-10 rounded-full object-cover border border-white/[0.06]" loading="lazy">'
            : '<div class="w-10 h-10 rounded-full avatar-placeholder text-[12px]">' + initials + '</div>';
        const lastText = lastMsg ? (lastMsg.media_url ? '[صورة]' : lastMsg.content) : 'ابدأ المحادثة';
        const time = lastMsg ? formatTime(lastMsg.created_at) : '';
        const isActive = activeChatId === chat.id;
        return '<div class="chat-row flex items-center gap-3 px-3 py-3 rounded-xl cursor-pointer ' + (isActive ? 'active' : '') + '" onclick="openChat(\'' + chat.id + '\', \'' + escapeHtml(chatName) + '\', \'' + (otherProfile?.avatar_url || '') + '\', \'' + (otherProfile?.status || '') + '\', ' + (chat.type === 'group') + ', \'' + (otherProfile?.id || '') + '\')"><div class="relative shrink-0">' + avatarHtml + (chat.type !== 'group' && isOnline ? '<div class="status-dot status-online absolute -bottom-0.5 -left-0.5 border-2 border-[#121214]"></div>' : '') + '</div><div class="flex-1 min-w-0"><div class="flex items-center justify-between mb-0.5"><h3 class="text-[13px] font-medium text-[#F5F5F5] truncate">' + escapeHtml(chatName) + '</h3><span class="text-[10px] ' + (unreadCount > 0 ? 'text-[#F5F5F5] font-medium' : 'text-[#9CA3AF]') + ' font-light">' + time + '</span></div><div class="flex items-center justify-between"><p class="text-[12px] text-[#9CA3AF] truncate max-w-[190px] font-light">' + escapeHtml(lastText) + '</p>' + (unreadCount > 0 ? '<span class="min-w-[18px] h-[18px] rounded-full bg-[#F5F5F5] text-[#0F0F11] flex items-center justify-center text-[10px] font-medium px-1.5 ml-1">' + (unreadCount > 99 ? '99+' : unreadCount) + '</span>' : '') + '</div></div></div>';
    }).join('');
}

function filterChats(query) {
    if (!query.trim()) { renderChatList(chatsData); return; }
    const filtered = chatsData.filter(chat => {
        const name = chat.type === 'group' ? chat.name : (chat.otherProfile?.username || '');
        return name.toLowerCase().includes(query.toLowerCase());
    });
    renderChatList(filtered);
}

// ==================== OPEN CHAT ====================
async function openChat(chatId, name, avatar, status, isGroup, partnerId) {
    activeChatId = chatId;
    activeChatPartnerId = partnerId;
    currentPage = 0;
    hasMoreMessages = true;
    messagesData = [];
    document.getElementById('emptyState').classList.add('hidden');
    document.getElementById('chatContent').classList.remove('hidden');
    document.getElementById('chatContent').classList.add('flex');

    // Render header avatar
    const headerImg = document.getElementById('headerAvatar');
    const headerPlaceholder = document.getElementById('headerAvatarPlaceholder');
    if (avatar) {
        headerImg.src = avatar;
        headerImg.style.display = 'block';
        headerPlaceholder.style.display = 'none';
    } else {
        headerImg.style.display = 'none';
        headerPlaceholder.style.display = 'flex';
        headerPlaceholder.textContent = getInitials(name);
    }

    document.getElementById('headerName').textContent = name;
    const headerAdminBadge = document.getElementById('headerAdminBadge');
    if (partnerId === ADMIN_UID) headerAdminBadge.classList.remove('hidden');
    else headerAdminBadge.classList.add('hidden');
    updateHeaderStatus(status, isGroup, partnerId);
    await fetchMessages(chatId, true);
    await markMessagesAsRead(chatId);
    renderChatList(chatsData);
    if (window.innerWidth < 768) {
        document.getElementById('chatListScreen').classList.add('-translate-x-full');
        document.getElementById('activeChatScreen').classList.remove('hidden');
        document.getElementById('activeChatScreen').classList.add('flex');
    }
    setTimeout(() => document.getElementById('messageInput').focus(), 300);
}

function updateHeaderStatus(status, isGroup, partnerId) {
    const headerStatus = document.getElementById('headerStatus');
    const dot = document.getElementById('headerOnlineDot');
    if (isGroup) { headerStatus.textContent = 'محادثة جماعية'; headerStatus.className = 'text-[11px] text-[#9CA3AF] font-light mt-0.5'; dot.classList.add('hidden'); }
    else if (status === 'Online') { headerStatus.textContent = 'متصل'; headerStatus.className = 'text-[11px] text-[#4ADE80] font-light mt-0.5'; dot.classList.remove('hidden'); dot.className = 'status-dot status-online absolute -bottom-0.5 -left-0.5 border-2 border-[#0F0F11]'; }
    else { fetchPartnerStatus(partnerId); }
}

async function fetchPartnerStatus(partnerId) {
    if (!partnerId) return;
    try {
        const { data, error } = await supabase.from('profiles').select('status, last_seen, is_online').eq('id', partnerId).single();
        if (error || !data) return;
        const headerStatus = document.getElementById('headerStatus');
        const dot = document.getElementById('headerOnlineDot');
        if (data.is_online) { headerStatus.textContent = 'متصل'; headerStatus.className = 'text-[11px] text-[#4ADE80] font-light mt-0.5'; dot.classList.remove('hidden'); dot.className = 'status-dot status-online absolute -bottom-0.5 -left-0.5 border-2 border-[#0F0F11]'; }
        else { headerStatus.textContent = formatLastSeen(data.last_seen); headerStatus.className = 'text-[11px] text-[#6B7280] font-light mt-0.5'; dot.classList.add('hidden'); }
    } catch (err) { console.error('fetchPartnerStatus error:', err); }
}

// ==================== MESSAGES ====================
async function fetchMessages(chatId, reset = false) {
    if (!chatId || isLoadingMore) return;
    isLoadingMore = true;
    const area = document.getElementById('messagesArea');
    if (reset) {
        area.innerHTML = '<div class="flex flex-col items-center justify-center h-full text-[#525252]"><div class="spinner mb-3"></div><p class="text-[12px] text-[#6B7280]">جاري تحميل الرسائل...</p></div>';
    }
    try {
        const from = currentPage * MESSAGES_PER_PAGE;
        const to = from + MESSAGES_PER_PAGE - 1;
        const { data, error } = await supabase.from('messages')
            .select('id, content, media_url, sender_id, created_at, is_read, status, sender:sender_id (username, avatar_url)')
            .eq('chat_id', chatId).order('created_at', { ascending: false }).range(from, to);
        if (error) throw error;
        if (!data || data.length === 0) {
            hasMoreMessages = false;
            if (reset) { area.innerHTML = '<div class="flex flex-col items-center justify-center h-full text-[#525252]"><p class="text-[12px] font-light text-[#9CA3AF]">ابدأ المحادثة</p></div>'; }
            isLoadingMore = false;
            return;
        }
        if (data.length < MESSAGES_PER_PAGE) hasMoreMessages = false;
        const newMessages = data.reverse();
        if (reset) messagesData = newMessages;
        else messagesData = [...newMessages, ...messagesData];
        renderMessages(messagesData, !reset);
        if (!reset) {
            const firstNewMsg = area.querySelector('[data-msg-id="' + (newMessages[0]?.id || '') + '"]');
            if (firstNewMsg) firstNewMsg.scrollIntoView({ behavior: 'smooth' });
        } else {
            scrollToBottom();
        }
    } catch (err) {
        console.error('fetchMessages error:', err);
        if (reset) {
            area.innerHTML = '<div class="flex flex-col items-center justify-center h-full text-[#525252]"><i class="fas fa-triangle-exclamation text-xl mb-3"></i><p class="text-[12px] text-[#6B7280] mb-2">فشل تحميل الرسائل</p><button onclick="fetchMessages(\'' + chatId + '\', true)" class="retry-btn">إعادة المحاولة</button></div>';
        }
    } finally { isLoadingMore = false; }
}

function renderMessages(messages, prepend = false) {
    const area = document.getElementById('messagesArea');
    if (!messages || !messages.length) { area.innerHTML = '<div class="flex flex-col items-center justify-center h-full text-[#525252]"><p class="text-[12px] font-light text-[#9CA3AF]">ابدأ المحادثة</p></div>'; return; }
    let html = '';
    let lastDate = null;
    messages.forEach((msg, index) => {
        const isMe = msg.sender_id === currentUser?.id;
        const showAvatar = !isMe && (index === 0 || messages[index - 1]?.sender_id !== msg.sender_id);
        const time = formatTime(msg.created_at);
        const date = formatDate(msg.created_at);
        if (date !== lastDate) { html += '<div class="flex justify-center my-4" data-date="' + date + '"><span class="text-[10px] text-[#6B7280] bg-[#18181C] px-3 py-1 rounded-full border border-white/[0.04]">' + date + '</span></div>'; lastDate = date; }
        let statusIcon = '';
        if (isMe) {
            if (msg.status === 'read' || msg.is_read) statusIcon = '<i class="fas fa-check-double text-[#4ADE80]"></i>';
            else if (msg.status === 'delivered') statusIcon = '<i class="fas fa-check-double text-[#9CA3AF]"></i>';
            else statusIcon = '<i class="fas fa-check text-[#525252]"></i>';
        }
        const senderAvatar = msg.sender?.avatar_url;
        const senderInitials = getInitials(msg.sender?.username);
        const avatarHtml = !isMe && showAvatar
            ? (senderAvatar ? '<img src="' + senderAvatar + '" class="w-5 h-5 rounded-full object-cover border border-white/[0.06] self-end mb-1" loading="lazy">' : '<div class="w-5 h-5 rounded-full avatar-placeholder text-[8px] self-end mb-1">' + senderInitials + '</div>')
            : !isMe ? '<div class="w-5 shrink-0"></div>' : '';
        html += '<div class="flex ' + (isMe ? 'justify-start' : 'justify-end') + ' mb-2 msg-enter" style="animation-delay: ' + Math.min(index * 0.03, 0.3) + 's" data-msg-id="' + msg.id + '"><div class="flex items-end gap-2 max-w-[78%] ' + (isMe ? 'flex-row' : 'flex-row-reverse') + '">' + avatarHtml + '<div class="' + (isMe ? 'bubble-me' : 'bubble-other') + ' px-3.5 py-2 rounded-md ' + (isMe ? 'rounded-tl-sm' : 'rounded-tr-sm') + '">' + (msg.media_url ? '<img src="' + msg.media_url + '" class="msg-image mb-1.5" onclick="openImagePreview(\'' + msg.media_url + '\')" loading="lazy">' : '') + (msg.content ? '<p class="text-[13px] leading-relaxed font-normal ' + (isMe ? 'text-[#F5F5F5]' : 'text-[#E5E7EB]') + '">' + escapeHtml(msg.content) + '</p>' : '') + '<div class="flex items-center gap-1.5 mt-1 ' + (isMe ? 'justify-start' : 'justify-end') + '"><span class="text-[10px] text-[#9CA3AF] font-light">' + time + '</span>' + (isMe ? '<span class="msg-status">' + statusIcon + '</span>' : '') + '</div></div></div></div>';
    });
    if (hasMoreMessages) { html = '<div class="flex justify-center my-2"><button onclick="loadMoreMessages()" class="load-more-btn" id="loadMoreBtn"><i class="fas fa-chevron-up ml-1"></i> تحميل المزيد</button></div>' + html; }
    if (prepend && area.querySelector('[data-msg-id]')) {
        const loadMoreBtn = area.querySelector('#loadMoreBtn');
        if (loadMoreBtn) loadMoreBtn.remove();
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = html;
        area.insertBefore(tempDiv, area.firstChild);
    } else {
        area.innerHTML = html;
    }
}

async function loadMoreMessages() {
    if (isLoadingMore || !hasMoreMessages || !activeChatId) return;
    currentPage++;
    await fetchMessages(activeChatId, false);
}

function scrollToBottom() { const area = document.getElementById('messagesArea'); area.scrollTop = area.scrollHeight; }

// ==================== SEND MESSAGE ====================
async function sendMessage(content, mediaUrl = null) {
    if (!activeChatId || !currentUser) return;
    try {
        const { error } = await supabase.from('messages').insert({
            chat_id: activeChatId,
            sender_id: currentUser.id,
            content: content || '',
            media_url: mediaUrl,
            is_read: false,
            status: 'sent'
        });
        if (error) throw error;
        await fetchMessages(activeChatId, true);
        await fetchChats();
    } catch (err) { showToast('فشل إرسال الرسالة'); console.error('sendMessage error:', err); }
}

document.getElementById('sendBtn').addEventListener('click', () => {
    const input = document.getElementById('messageInput');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    input.style.height = 'auto';
    sendMessage(text);
    stopTyping();
});

document.getElementById('messageInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); document.getElementById('sendBtn').click(); }
});

document.getElementById('messageInput').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

// ==================== TYPING INDICATOR ====================
function handleTyping() {
    if (!activeChatId || !currentUser || !activeChatPartnerId) return;
    if (!isTyping) { isTyping = true; broadcastTyping(true); }
    if (typingTimeout) clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => { stopTyping(); }, 2000);
}

function stopTyping() {
    isTyping = false;
    if (typingTimeout) { clearTimeout(typingTimeout); typingTimeout = null; }
    broadcastTyping(false);
}

async function broadcastTyping(isTyping) {
    if (!activeChatId || !currentUser) return;
    try {
        await supabase.from('typing_status').upsert({
            chat_id: activeChatId,
            user_id: currentUser.id,
            is_typing: isTyping,
            updated_at: new Date().toISOString()
        }, { onConflict: ['chat_id', 'user_id'] });
    } catch (err) { console.error('broadcastTyping error:', err); }
}

function showTypingIndicator(show) {
    const container = document.getElementById('typingIndicatorContainer');
    if (show) container.classList.add('visible');
    else container.classList.remove('visible');
}

// ==================== IMAGE HANDLING ====================
function handleImageSelect(e) {
    if (!isAdmin) { showToast('غير مصرح: المشرف فقط'); e.target.value = ''; return; }
    const file = e.target.files[0];
    if (!file) return;
    if (!file.type.startsWith('image/')) { showToast('يرجى اختيار صورة'); return; }
    if (file.size > 5 * 1024 * 1024) { showToast('الصورة يجب أن تكون أقل من 5 ميجا'); return; }
    pendingImageFile = file;
    cropperCallback = async (blob) => {
        try {
            showToast('جاري رفع الصورة...');
            const fileName = 'admin_' + currentUser.id + '_' + Date.now() + '.jpg';
            const { data, error } = await supabase.storage.from('chat-media').upload(fileName, blob, { contentType: 'image/jpeg', cacheControl: '3600' });
            if (error) { showToast('فشل الرفع'); console.error('Upload error:', error); return; }
            const { data: urlData } = supabase.storage.from('chat-media').getPublicUrl(fileName);
            await sendMessage('', urlData.publicUrl);
            showToast('تم إرسال الصورة');
        } catch (err) { showToast('فشل الرفع'); console.error('confirmCrop error:', err); }
    };
    const reader = new FileReader();
    reader.onload = (event) => {
        const img = document.getElementById('cropperImage');
        img.src = event.target.result;
        document.getElementById('cropperModal').classList.add('active');
        if (cropperInstance) cropperInstance.destroy();
        cropperInstance = new Cropper(img, { aspectRatio: NaN, viewMode: 1, background: false, autoCropArea: 0.9, responsive: true, guides: false, center: false, highlight: false, cropBoxMovable: true, cropBoxResizable: true, toggleDragModeOnDblclick: false });
    };
    reader.readAsDataURL(file);
}

function closeCropper() {
    document.getElementById('cropperModal').classList.remove('active');
    if (cropperInstance) { cropperInstance.destroy(); cropperInstance = null; }
    pendingImageFile = null;
    cropperCallback = null;
    document.getElementById('imageInput').value = '';
    document.getElementById('profileImageInput').value = '';
}

async function confirmCrop() {
    if (!cropperInstance || !pendingImageFile || !cropperCallback) return;
    const canvas = cropperInstance.getCroppedCanvas({ width: 1200, height: 1200, fillColor: '#0F0F11', imageSmoothingEnabled: true, imageSmoothingQuality: 'high' });
    closeCropper();
    canvas.toBlob(async (blob) => {
        if (cropperCallback) await cropperCallback(blob);
    }, 'image/jpeg', 0.85);
}

function openImagePreview(url) { document.getElementById('previewImage').src = url; document.getElementById('imagePreviewModal').classList.add('active'); }
function closeImagePreview() { document.getElementById('imagePreviewModal').classList.remove('active'); document.getElementById('previewImage').src = ''; }

// ==================== REALTIME SUBSCRIPTIONS ====================
function subscribeToMessages() {
    if (realtimeChannel) return;
    realtimeChannel = supabase.channel('messages-channel')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, async (payload) => {
            if (payload.new.chat_id === activeChatId) {
                if (payload.new.sender_id !== currentUser?.id) await updateMessageStatus(payload.new.id, 'delivered');
                await fetchMessages(activeChatId, true);
                await markMessagesAsRead(activeChatId);
            }
            await fetchChats();
        })
        .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'messages' }, async (payload) => {
            if (payload.new.chat_id === activeChatId) await fetchMessages(activeChatId, true);
        })
        .subscribe();
}

function subscribeToStatus() {
    if (statusChannel) return;
    statusChannel = supabase.channel('status-channel')
        .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'profiles' }, (payload) => {
            if (payload.new.id === activeChatPartnerId) updateHeaderStatus(payload.new.status, false, payload.new.id);
            const chatIndex = chatsData.findIndex(c => c.otherProfile?.id === payload.new.id);
            if (chatIndex !== -1) { chatsData[chatIndex].otherProfile = { ...chatsData[chatIndex].otherProfile, ...payload.new }; renderChatList(chatsData); }
        })
        .subscribe();
}

function subscribeToTyping() {
    if (typingChannel) return;
    typingChannel = supabase.channel('typing-channel')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'typing_status' }, (payload) => {
            if (payload.new.chat_id === activeChatId && payload.new.user_id !== currentUser?.id) showTypingIndicator(payload.new.is_typing);
        })
        .subscribe();
}

// ==================== MESSAGE STATUS UPDATES ====================
async function updateMessageStatus(messageId, status) {
    if (!currentUser) return;
    try { await supabase.from('messages').update({ status: status }).eq('id', messageId); }
    catch (err) { console.error('updateMessageStatus error:', err); }
}

async function markMessagesAsRead(chatId) {
    if (!currentUser || !chatId) return;
    try {
        const { error } = await supabase.from('messages').update({ is_read: true, status: 'read' }).eq('chat_id', chatId).neq('sender_id', currentUser.id).eq('is_read', false);
        if (error) throw error;
        const chatIndex = chatsData.findIndex(c => c.id === chatId);
        if (chatIndex !== -1) { chatsData[chatIndex].unreadCount = 0; renderChatList(chatsData); }
    } catch (err) { console.error('markMessagesAsRead error:', err); }
}

// ==================== ADMIN PANEL ====================
function showAdminPanel() {
    if (!isAdmin) { showToast('غير مصرح'); return; }
    showToast('لوحة المشرف: إدارة الصور والمستخدمين');
}

// ==================== UTILITY FUNCTIONS ====================
function formatTime(isoString) {
    if (!isoString) return '';
    const date = new Date(isoString);
    return date.toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit', hour12: true });
}

function formatDate(isoString) {
    if (!isoString) return '';
    const date = new Date(isoString);
    const now = new Date();
    const diff = now - date;
    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    if (days === 0) return 'اليوم';
    if (days === 1) return 'أمس';
    if (days < 7) return date.toLocaleDateString('ar-SA', { weekday: 'long' });
    return date.toLocaleDateString('ar-SA', { month: 'short', day: 'numeric' });
}

function formatLastSeen(isoString) {
    if (!isoString) return 'غير متصل';
    const date = new Date(isoString);
    const now = new Date();
    const diff = now - date;
    const minutes = Math.floor(diff / (1000 * 60));
    const hours = Math.floor(diff / (1000 * 60 * 60));
    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    if (minutes < 1) return 'متصل';
    if (minutes < 60) return 'آخر ظهور ' + minutes + ' دقيقة';
    if (hours < 24) return 'آخر ظهور ' + hours + ' ساعة';
    if (days === 1) return 'آخر ظهور أمس';
    if (days < 7) return 'آخر ظهور ' + days + ' أيام';
    return 'آخر ظهور ' + date.toLocaleDateString('ar-SA', { month: 'short', day: 'numeric' });
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function showToast(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
}

// ==================== NAVIGATION ====================
document.getElementById('backBtn').addEventListener('click', () => {
    document.getElementById('chatListScreen').classList.remove('-translate-x-full');
    setTimeout(() => {
        document.getElementById('activeChatScreen').classList.add('hidden');
        document.getElementById('activeChatScreen').classList.remove('flex');
    }, 250);
    activeChatId = null;
    activeChatPartnerId = null;
    stopTyping();
});

window.addEventListener('resize', () => {
    if (window.innerWidth >= 768) {
        document.getElementById('chatListScreen').classList.remove('-translate-x-full');
        document.getElementById('activeChatScreen').classList.remove('hidden');
        document.getElementById('activeChatScreen').classList.add('flex');
    } else if (!activeChatId) {
        document.getElementById('activeChatScreen').classList.add('hidden');
        document.getElementById('activeChatScreen').classList.remove('flex');
    }
});

document.addEventListener('visibilitychange', () => { if (currentUser) updateOnlineStatus(!document.hidden); });
window.addEventListener('beforeunload', () => { if (currentUser) updateOnlineStatus(false); });
document.addEventListener('DOMContentLoaded', initSupabase);
</script>
